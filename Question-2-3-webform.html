<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
        <meta charset="utf-8">
        <style>.control, fieldset {
      margin: 6px 0;
    }
    
    label {
      display: inline-block;
      width: 120px;
      vertical-align: top;
    }
    
    input + label {
      width: auto;
    }
    
    .error, .required {
      color: red;
    }
    
    fieldset ul {
      margin: 0;
    }</style>
    </head>
    <body>
        <h1>Feedback form</h1>
    <form novalidate>
        <!-- Added for/id so label is connected to input.
             Also added required so the field must be filled. -->
        <div class="control">
          <label for="name">Full name <span class="required">*</span></label>
          <input id="name" name="name" type="text" required />
        </div>
        <!-- Removed wrong type attribute from textarea.
            Added required to make it mandatory. -->
        <div class="control">
          <label for="biography">Biography <span class="required">*</span></label>
          <textarea id="biography" name="biography" required></textarea>
          <span>Include examples on your skills in JavaScript.</span>
        </div>
        
        <!-- Wrapped radio buttons in a fieldset with legend
            so screen readers understand they belong together. -->
        <fieldset class="control">
          <legend>Gender <span class="required">*</span></legend>

          <div>
            <input id="gender_male" name="gender" type="radio" value="male" />
            <label for="gender_male">Male</label>
          </div>

          <div>
            <input id="gender_female" name="gender" type="radio" value="female" />
            <label for="gender_female">Female</label>
          </div>
        </fieldset>
        
        <!-- Connected checkbox to label using for/id -->
        <div class="control">
          <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" />
          <label for="accept_agbs">
            I accept the terms and conditions <span class="required">*</span>
          </label>
        </div>
        <div class="control">
          <!-- Hidden field triggers validation -->
          <input name="validate" type="hidden" value="1" />
          
          <!-- Submit button -->
          <input type="submit" value="Register" />
        </div>
      </form>
      
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
          <script>"use strict";
      
      ;
      (function () {
        var validateInput;
      
        $.urlParam = function (name) {
          var results;
          results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
      
          if (results === null) {
            return null;
          } else {
            return decodeURI(results[1]) || null;
          }
        };
      
        validateInput = function validateInput(input, message) {
          var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;
          $input = $('[name="' + input + '"]');

          // If the input has no value, show error
          if ((value = $.urlParam(input)) === null) {

            // Create error summary at top (only once)
            if ($('fieldset.errors').length === 0) {
              $('form').prepend(
                '<fieldset class="errors" role="alert" aria-live="assertive" tabindex="-1">' +
                  '<legend>Errors</legend><ul></ul>' +
                '</fieldset>'
              );
            }

            $errorContainer = $('fieldset.errors ul');

            // Handle radio buttons differently
            if ($input.is(':radio')) {
              $fieldset = $input.closest('fieldset');
              $elementToDescribe = $fieldset;
              $referencedElement = $input.filter(':first');
            } else {
              $elementToDescribe = $input;
              $referencedElement = $input;
            }

            // Create clickable error message linked to the input
            var refId = $referencedElement.attr('id');
            $error = $('<a class="error" href="#' + refId + '">' + message + '</a>');

            // When clicking error, move focus to field
            $error.on('click', function (e) {
              $referencedElement.focus();
              e.preventDefault();
            });

            // Connect error with input
            $elementToDescribe.attr('aria-describedby', input + '_description');

            // Add error to list
            $errorContainer.append($('<li></li>').append($error));

          } else {

            // If value exists, keep original behavior
            if ($input.is(':checkbox')) {
              $input.prop('checked', true);
            } else if ($input.is(':radio')) {
              $input.filter('[value="' + value + '"]').prop('checked', true);
            } else {
              $input.val(value);
            }
          }
        };
      
        $(document).ready(function () {
          if ($.urlParam('validate')) {

            // Remove old errors before validating again
            $('fieldset.errors').remove();

            validateInput('name', 'Please enter your name!');
            validateInput('biography', 'Please tell us something about your history!');
            validateInput('gender', 'Please tell us your gender!');
            validateInput('accept_agbs', 'You must accept our terms and conditions!');

            // If there are errors, move focus to error summary
            if ($('fieldset.errors').length > 0) {
              $('fieldset.errors').focus();
              return;
            }

            // Only show success message when everything is correct
            alert('All inputs are valid.');
          }
        });
      }).call(void 0);</script>
                
        </body>
      </html>
